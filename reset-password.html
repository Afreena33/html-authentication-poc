<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <!-- Main Container -->
    <div class="container">

        <!-- Reset Password Card -->
        <div class="card shadow p-4 mx-auto" style="max-width: 400px;">

            <!-- Page Heading -->
            <h2 class="text-center mb-3">Reset Password</h2>

            <!-- Reset Form -->
            <form>

                <!-- New Password Input -->
               <div class="mb-3">
    <label class="form-label">New Password</label>
    <div class="input-group">
        <input type="password" id="newPass" class="form-control" placeholder="Enter new password">
        <button class="btn btn-outline-secondary" type="button" onclick="toggle('newPass')">Show</button>
    </div>
</div>

<div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <div class="input-group">
        <input type="password" id="confirmPass" class="form-control" placeholder="Confirm password">
        <button class="btn btn-outline-secondary" type="button" onclick="toggle('confirmPass')">Show</button>
    </div>
</div>

                <!-- Reset Button -->
                <a href="login.html" class="btn btn-primary w-100">Reset Password</a>

            </form>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
function toggle(id) {
    var x = document.getElementById(id);
    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
